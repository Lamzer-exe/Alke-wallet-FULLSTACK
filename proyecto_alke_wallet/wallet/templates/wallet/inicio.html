{% extends 'wallet/base.html' %} 
{% block titulo %}Inicio - AlkeWallet{% endblock %} 
{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-8 text-center">
    <h1 class="display-4 mb-4">Bienvenido a AlkeWallet</h1>
    {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg">
          Ir a mi Dashboard
        </a>
        {% else %}
        <a href="{% url 'registro' %}" class="btn btn-primary btn-lg me-2">
          Crear Cuenta
        </a>
        <a href="{% url 'login' %}" class="btn btn-outline-primary btn-lg">
          Iniciar Sesión
        </a>
    {% endif %}
  </div>
</div>
{% endblock %}
